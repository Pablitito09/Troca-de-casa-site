<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Diagnóstico Troca de Casa · Zome Prime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>


  :root{
    --bg: #F4EEE1;
    --paper: #FFFFFF;
    --paper-warm: #FFFCF5;
    --ink: #2E2A22;
    --ink-soft: #8C8271;
    --pine: #B08D3E;
    --pine-dark: #2E2A22;
    --rust: #B08D3E;
    --rust-soft: #F1E4C0;
    --gold: #B08D3E;
    --gold-deep: #8A6D2E;
    --gold-pale: #F1E4C0;
    --gold-tint: #FAF3DF;
    --line: #D9CA9C;
    --radius: 20px;
    --shadow: 0 1px 2px rgba(46,42,34,.05), 0 30px 55px -22px rgba(46,42,34,.22), 0 70px 110px -45px rgba(176,141,62,.4);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);}
  body{overflow-x:hidden;}
  #app{
    font-family:'Public Sans', sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:600px;
    width:100%;
    display:flex;
    align-items:flex-start;
    justify-content:center;
    padding:32px 16px;
  }
  #app h1, #app h2, #app .display{
    font-family:'Fraunces', serif;
    font-weight:600;
    letter-spacing:-0.01em;
  }
  .eyebrow{
    font-size:11.5px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--rust);
    font-weight:700;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .card{
    background:var(--paper);
    border-radius:var(--radius);
    box-shadow:var(--shadow), 0 0 0 1px rgba(255,255,255,.6) inset;
    width:100%;
    max-width:640px;
    overflow:hidden;
    border:1.5px solid var(--line);
  }
  .card.wide{ max-width:800px; }
  .card.wide.xl{ max-width:920px; }
  .card.wide.xl .card-body{ padding:38px 42px 34px; }
  .card.wide.xl .opt{ padding:16px 18px; }
  @media (max-width:600px){
    .card.wide.xl .card-body{ padding:22px 18px 20px; }
    .card.wide.xl .opt{ padding:12px 14px; }
  }
  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 28px;
    border-bottom:1px solid var(--line);
  }
  .step-label{font-size:12px;font-weight:700;color:var(--ink-soft);letter-spacing:.05em;}
  .pct{font-size:12px;font-weight:700;color:var(--rust);}
  .progress-track{height:3px;background:var(--line);width:100%;}
  .progress-fill{height:3px;background:var(--rust);transition:width .5s cubic-bezier(.4,0,.2,1);}
  .card-body{padding:32px 28px 28px;}
  .card-body h2{font-size:26px;margin:6px 0 8px;color:var(--pine-dark);}
  .lede{color:var(--ink-soft);font-size:14.5px;margin:0 0 24px;line-height:1.5;}
  .q-label{font-size:13px;font-weight:700;color:var(--ink);margin-bottom:12px;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:22px;}
  @media (max-width:520px){.grid2{grid-template-columns:1fr;}}
  .opt{
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:14px 16px;
    background:#fff;
    cursor:pointer;
    transition:border-color .15s, background .15s, transform .1s;
    text-align:left;
  }
  .opt:hover{border-color:var(--gold); transform:translateY(-1px); box-shadow:0 6px 16px -8px rgba(176,141,62,.35);}
  .opt.selected{border-color:var(--gold); background:var(--gold-tint);}
  .opt .t{font-weight:700;font-size:14.5px;color:var(--ink);}
  .opt .s{font-size:12.5px;color:var(--ink-soft);margin-top:2px;}
  .opt-icon{display:flex;align-items:center;justify-content:center;width:34px;height:34px;margin-bottom:8px;border-radius:9px;background:var(--gold-tint);color:var(--gold-deep);}
  .opt-icon svg{width:19px;height:19px;}
  .opt.selected .opt-icon{background:#fff;}
  .inline-icon{display:inline-flex;flex:0 0 auto;color:var(--gold-deep);}
  .inline-icon svg{display:block;}
  select, input[type=text], input[type=tel], input[type=email]{
    width:100%;
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:13px 14px;
    font-size:14.5px;
    font-family:inherit;
    background:#fff;
    color:var(--ink);
  }
  select:focus, input:focus{outline:2px solid var(--gold); outline-offset:1px;}
  label.field-label{font-size:12px;font-weight:700;letter-spacing:.04em;color:var(--ink-soft);display:block;margin-bottom:6px;text-transform:uppercase;}
  .field{margin-bottom:18px;}
  .btn-primary{
    width:100%;
    background:linear-gradient(135deg, #C7A458 0%, var(--gold-deep) 100%);
    color:#fff;
    border:none;
    border-radius:14px;
    padding:16px 20px;
    font-weight:700;
    font-size:15px;
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;gap:8px;
    box-shadow:0 14px 26px -12px rgba(138,109,46,.55);
    transition:filter .15s, transform .1s;
  }
  .btn-primary:hover{filter:brightness(1.06); transform:translateY(-1px);}
  .btn-primary:disabled{background:#E2DBC8;color:#A79E8A;box-shadow:none;cursor:not-allowed;}
  .btn-back{
    background:none;border:none;color:var(--ink-soft);font-size:13px;
    margin-top:14px;cursor:pointer;text-decoration:underline;
    display:flex;align-items:center;gap:4px;
  }
  .tag-multi{
    display:flex;flex-wrap:wrap;gap:8px;margin-top:10px;
  }
  .chip{
    border:1.5px solid var(--gold);color:var(--gold-deep);background:var(--gold-tint);
    border-radius:999px;padding:6px 12px;font-size:12.5px;font-weight:700;
    display:flex;align-items:center;gap:6px;
  }
  .chip button{background:none;border:none;color:var(--gold-deep);cursor:pointer;font-weight:900;}

  /* LANDING */
  .landing{
    background:linear-gradient(180deg, #FFFEFA 0%, #FBF4E4 100%);
    border-radius:28px;
    max-width:640px;
    width:100%;
    padding:56px 42px 46px;
    text-align:center;
    color:var(--ink);
    box-shadow:var(--shadow);
    position:relative;
    overflow:hidden;
    border:1.5px solid var(--gold-pale);
  }
  .landing::before{
    content:"";position:absolute;inset:0;
    background:radial-gradient(circle at 50% -10%, rgba(176,141,62,.20), transparent 62%);
    pointer-events:none;
  }
  .landing .kicker{
    font-size:11px;letter-spacing:.18em;text-transform:uppercase;
    color:var(--gold-deep); font-weight:700;
    border:1px solid rgba(176,141,62,.35); background:var(--gold-tint);
    display:inline-block;padding:6px 14px;border-radius:999px;margin-bottom:28px;
  }
  .avatar-wrap{
    width:176px;height:176px;border-radius:50%;
    margin:0 auto 24px;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle, #FDFAF2 0%, #F3E6C4 62%, #E5D19E 100%);
    border:1px solid rgba(176,141,62,.4);
    box-shadow:0 0 0 1px rgba(176,141,62,.12), 0 24px 40px -14px rgba(176,141,62,.45);
    position:relative;
  }
  .avatar{
    width:136px;height:136px;border-radius:50%;
    object-fit:cover;object-position:top center;
    border:4px solid #FFFFFF;
    display:block;
    box-shadow:0 10px 22px rgba(46,42,34,.22);
  }
  .landing h1{
    font-size:33px;line-height:1.16;color:var(--ink);margin:0 0 14px;
  }
  .landing h1 em{color:var(--gold-deep);font-style:italic;}
  .landing .sub{color:var(--ink-soft);font-size:14.5px;max-width:440px;margin:0 auto 32px;line-height:1.65;}
  .cta{
    background:linear-gradient(135deg, #C7A458 0%, var(--gold-deep) 100%);color:#fff;border:none;border-radius:14px;
    padding:18px 26px;font-weight:800;font-size:14px;letter-spacing:.02em;
    cursor:pointer;width:100%;max-width:440px;
    box-shadow:0 18px 34px -12px rgba(138,109,46,.55);
    transition:transform .12s, filter .15s;
  }
  .cta:hover{filter:brightness(1.06);transform:translateY(-2px);}
  .meta-row{
    display:flex;justify-content:center;gap:18px;flex-wrap:wrap;
    font-size:11.5px;color:var(--ink-soft);margin-top:20px;letter-spacing:.03em;
  }
  .slots{
    margin-top:16px;display:inline-flex;align-items:center;gap:8px;
    font-size:11.5px;color:var(--gold-deep);border:1px solid rgba(176,141,62,.3);
    padding:6px 14px;border-radius:999px;background:var(--gold-tint);
  }
  .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);display:inline-block;}

  /* THANK YOU */
  .center-card{max-width:520px;text-align:center;padding:44px 32px;}
  .score-ring{
    width:150px;height:150px;margin:0 auto 20px;position:relative;
  }
  .footer-note{font-size:11.5px;color:var(--ink-soft);margin-top:18px;line-height:1.6;}
  .lock-note{
    background:var(--gold-tint);border:1px solid var(--gold-pale);border-radius:12px;
    padding:12px 14px;font-size:12.5px;color:var(--gold-deep);margin-bottom:18px;
    display:flex;gap:8px;align-items:center;
  }
  .lock-note .inline-icon{margin-top:0;flex-shrink:0;}
  .checkbox-row{display:flex;gap:10px;align-items:flex-start;margin:18px 0;font-size:12.5px;color:var(--ink-soft);line-height:1.5;}
  .checkbox-row a{color:var(--gold-deep);}
  .admin-link{
    position:fixed;bottom:8px;right:10px;font-size:10px;color:#C8C2B2;
    background:none;border:none;cursor:pointer;
  }
  table.admin-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  table.admin-table th, table.admin-table td{border:1px solid var(--line);padding:8px;text-align:left;}
  table.admin-table th{background:var(--gold-tint);}

  /* MOBILE OPTIMIZATION — crisp, well-proportioned borders on small screens */
  @media (max-width:600px){
    #app{ padding:18px 10px; }
    .card{ border-radius:16px; }
    .card-top{ padding:14px 18px; }
    .card-body{ padding:22px 18px 20px; }
    .card-body h2{ font-size:20px; }
    .lede{ font-size:13px; margin-bottom:18px; }
    .grid2{ gap:10px; margin-bottom:18px; }
    .opt{ padding:12px 14px; }
    .btn-primary{ padding:15px 18px; font-size:14px; }
    .landing{ padding:38px 20px 30px; border-radius:20px; max-width:100%; }
    .landing h1{ font-size:24px; }
    .landing .sub{ font-size:13.5px; }
    .avatar-wrap{ width:132px; height:132px; }
    .avatar{ width:100px; height:100px; border-width:3px; }
    .cta{ padding:16px 18px; font-size:13px; }
    .center-card{ padding:32px 20px; }
    table.admin-table{ font-size:11px; }
    .card.wide{ max-width:100%; }
  }
  @media (max-width:380px){
    .landing h1{ font-size:21px; }
    .card-body h2{ font-size:18px; }
    .avatar-wrap{ width:112px; height:112px; }
    .avatar{ width:84px; height:84px; }
  }
</style>
</head>

    step: 1,
    totalSteps: 7,
    answers: {}

  function icon(name, size){
    var svgns = 'http://www.w3.org/2000/svg';
    var svg = document.createElementNS(svgns, 'svg');
    svg.setAttribute('viewBox', '0 0 24 24');
    svg.setAttribute('width', size || 20);
    svg.setAttribute('height', size || 20);
    svg.setAttribute('fill', 'none');
    svg.setAttribute('stroke', 'currentColor');
    svg.setAttribute('stroke-width', '1.6');
    svg.setAttribute('stroke-linecap', 'round');
    svg.setAttribute('stroke-linejoin', 'round');
    svg.innerHTML = ICONS[name] || '';
    return svg;
  }
  function iconTag(name, size){
    return el('span', {class:'inline-icon'}, [icon(name, size)]);
  }

  function el(tag, attrs, children){
    var e = document.createElement(tag);
    attrs = attrs || {};
    for(var k in attrs){
      if(k === 'class') e.className = attrs[k];
      else if(k === 'html') e.innerHTML = attrs[k];
      else if(k.indexOf('on') === 0) e.addEventListener(k.slice(2), attrs[k]);
      else e.setAttribute(k, attrs[k]);
    }
    (children||[]).forEach(function(c){ if(c) e.appendChild(c); });
    return e;
  }
  function text(t){ return document.createTextNode(t); }

  var root = document.getElementById('app');

  function render(){
    root.innerHTML = '';
    if(state.screen === 'landing') root.appendChild(renderLanding());
    else if(state.screen === 'quiz') root.appendChild(renderQuiz());
    else if(state.screen === 'lead') root.appendChild(renderLead());
    else if(state.screen === 'thanks') root.appendChild(renderThanks());
    else if(state.screen === 'admin') root.appendChild(renderAdmin());

    var adminBtn = el('button', {class:'admin-link', onclick:function(){
      state.screen = state.screen === 'admin' ? 'landing' : 'admin';
      render();
    }}, [text('painel')]);
    root.appendChild(adminBtn);
  }

  // ---------- LANDING ----------
  function renderLanding(){
    var wrap = el('div', {style:'display:flex;justify-content:center;width:100%;'});
    var card = el('div', {class:'landing'});
    card.appendChild(el('div', {class:'kicker'}, [text('Diagnóstico gratuito · Troca de casa')]));
    card.appendChild(el('div', {class:'avatar-wrap'}, [
      el('img', {class:'avatar', src:PHOTO_SRC, alt:CONFIG.CONSULTOR_NOME})
    ]));
    card.appendChild(el('h1', {}, [text('Trocar de casa '), el('em',{},[text('sem dar um passo em falso')]), text('?')]));
    card.appendChild(el('p', {class:'sub'}, [text('Responda a 7 perguntas rápidas e descubra, hoje, se está mesmo pronto para vender e comprar ao mesmo tempo — sem ficar preso entre duas casas.')]));
    card.appendChild(el('button', {class:'cta', onclick:function(){ state.screen='quiz'; state.step=1; render(); }}, [text('QUERO SABER SE ESTOU PRONTO →')]));
    card.appendChild(el('div', {class:'meta-row'}, [
      text('Gratuito'), text('·'), text('Sem compromisso'), text('·'), text('2 minutos')
    ]));
    card.appendChild(el('div', {class:'slots'}, [el('span',{class:'dot'}), text('Apenas 5 análises disponíveis esta semana')]));
    wrap.appendChild(card);
    return wrap;
  }

  // ---------- QUIZ FRAME ----------
  function quizFrame(stepLabel, title, lede, bodyChildren, opts){
    opts = opts || {};
    var pct = Math.round((state.step-1)/state.totalSteps*100) + 10;
    if(state.step === state.totalSteps) pct = 92;
    var card = el('div', {class:'card wide'+(opts.extraWide ? ' xl' : '')});
    var top = el('div', {class:'card-top'}, [
      el('span', {class:'step-label'}, [el('span',{style:'color:var(--rust)'},[text('● ')]), text('ETAPA '+state.step+' DE '+state.totalSteps)]),
      el('span', {class:'pct'}, [text(pct+'%')])
    ]);
    var track = el('div', {class:'progress-track'});
    track.appendChild(el('div', {class:'progress-fill', style:'width:'+pct+'%'}));
    var body = el('div', {class:'card-body'});
    body.appendChild(el('div', {class:'eyebrow'}, [text(stepLabel)]));
    body.appendChild(el('h2', {}, [text(title)]));
    body.appendChild(el('p', {class:'lede'}, [text(lede)]));
    bodyChildren.forEach(function(c){ body.appendChild(c); });

    var canBack = state.step > 1;
    if(canBack){
      body.appendChild(el('button', {class:'btn-back', onclick:function(){ state.step -= 1; render(); }}, [text('← Recuar')]));
    }

    var outer = el('div', {style:'display:flex;justify-content:center;width:100%;'});
    outer.appendChild(el('div', {}, [card]));
    card.appendChild(top);
    card.appendChild(track);
    card.appendChild(body);
    return outer;
  }

  function optionButton(label, sub, value, groupKey, iconName, onSelect){
    var isSel = state.answers[groupKey] === value;
    var b = el('button', {class:'opt'+(isSel?' selected':''), type:'button', onclick:function(){
      onSelect(value);
    }});
    if(iconName) b.appendChild(el('span', {class:'opt-icon'}, [icon(iconName)]));
    b.appendChild(el('div', {class:'t'}, [text(label)]));
    if(sub) b.appendChild(el('div', {class:'s'}, [text(sub)]));
    return b;
  }

  function continueBtn(label, enabledFn, onClick){
    var btn = el('button', {class:'btn-primary'}, [text(label+' →')]);
    var enabled = enabledFn();
    if(!enabled) btn.setAttribute('disabled','disabled');
    btn.addEventListener('click', function(){
      if(enabledFn()) onClick();
    });
    return btn;
  }

  function renderQuiz(){
    var s = state.step;
    if(s === 1) return step1();
    if(s === 2) return step2();
    if(s === 3) return step3();
    if(s === 4) return step4();
    if(s === 5) return step5();
    if(s === 6) return step6();
    if(s === 7) return step7();
  }

  // STEP 1 — motivo
  function step1(){
    var body = [];
    var grid = el('div', {class:'grid2'});
    var opts = [
      ['Já não há espaço em casa','A família cresceu e falta espaço','icon-fam','home'],
      ['Tenho casa a mais para gerir','Quero algo mais pequeno e prático','icon-red','trending-down'],
      ['Quero mudar de zona ou cidade','Outro bairro, outra cidade','icon-loc','map-pin'],
      ['Chegou a altura de subir de nível','Um imóvel melhor, numa zona melhor','icon-up','sparkles']
    ];
    var values = ['familia_cresceu','reduzir_casa','mudar_zona','upgrade'];
    opts.forEach(function(o, i){
      grid.appendChild(optionButton(o[0], o[1], values[i], 'motivo', o[3], function(v){
        state.answers.motivo = v; state.step = 2; render();
      }));
    });
    body.push(el('div', {class:'q-label'}, [text('O que o(a) fez pensar em mudar de casa agora?')]));
    body.push(grid);
    return quizFrame('ETAPA 1 · PONTO DE PARTIDA', 'O que o traz aqui?', 'Antes de falar do futuro, importa perceber o presente.', body);
  }

  // STEP 2 — imóvel atual
  function step2(){
    var body = [];
    body.push(el('div', {class:'q-label'}, [text('Tipo de imóvel que tem atualmente')]));
    var grid1 = el('div', {class:'grid2'});
    [['Apartamento','apartamento','building'],['Moradia','moradia','villa'],['Terreno','terreno','land'],['Não preciso de vender','sem_venda','check']].forEach(function(o){
      grid1.appendChild(optionButton(o[0], null, o[1], 'imovel_atual_tipo', o[2], function(v){ state.answers.imovel_atual_tipo = v; render(); }));
    });
    body.push(grid1);

    body.push(el('div', {class:'q-label'}, [text('Tipologia')]));
    var grid2 = el('div', {class:'grid2'});
    ['T1','T2','T3','T4+'].forEach(function(t){
      grid2.appendChild(optionButton(t, null, t, 'imovel_atual_tipologia', null, function(v){ state.answers.imovel_atual_tipologia = v; render(); }));
    });
    body.push(grid2);

    body.push(el('div', {class:'field'}, [
      el('label', {class:'field-label'}, [text('Zona do imóvel atual')]),
      (function(){
        var sel = el('select', {onchange:function(e){ state.answers.imovel_atual_zona = e.target.value; }});
        ['Selecione um distrito/zona','Lisboa','Porto','Braga','Coimbra','Setúbal','Faro','Aveiro','Leiria','Outra'].forEach(function(z,i){
          sel.appendChild(el('option', {value: i===0?'':z}, [text(z)]));
        });
        sel.value = state.answers.imovel_atual_zona || '';
        return sel;
      })()
    ]));

    body.push(el('div', {class:'q-label'}, [text('Valor estimado do imóvel atual')]));
    var grid3 = el('div', {class:'grid2'});
    ['Menos de 150.000€','150.000€ a 250.000€','250.000€ a 400.000€','400.000€ a 600.000€','600.000€ a 900.000€','Mais de 900.000€'].forEach(function(v){
      grid3.appendChild(optionButton(v, null, v, 'imovel_atual_valor', null, function(vv){ state.answers.imovel_atual_valor = vv; render(); }));
    });
    body.push(grid3);

    body.push(continueBtn('Avançar', function(){
      return state.answers.imovel_atual_tipo && state.answers.imovel_atual_valor;
    }, function(){ state.step = 3; render(); }));

    return quizFrame('ETAPA 2 · O QUE TEM HOJE', 'O que entra na equação?', 'A sua casa atual é a base de toda a operação.', body, {extraWide:true});
  }

  // STEP 3 — casa de destino
  function step3(){
    var body = [];
    body.push(el('div', {class:'q-label'}, [text('Tipo de imóvel que procura')]));
    var grid1 = el('div', {class:'grid2'});
    [['Apartamento','apartamento','building'],['Moradia','moradia','villa']].forEach(function(o){
      grid1.appendChild(optionButton(o[0], null, o[1], 'destino_tipo', o[2], function(v){ state.answers.destino_tipo = v; render(); }));
    });
    body.push(grid1);

    body.push(el('div', {class:'q-label'}, [text('Tipologia pretendida')]));
    var grid2 = el('div', {class:'grid2'});
    ['T1','T2','T3','T4+'].forEach(function(t){
      grid2.appendChild(optionButton(t, null, t, 'destino_tipologia', null, function(v){ state.answers.destino_tipologia = v; render(); }));
    });
    body.push(grid2);

    var zonesWrap = el('div', {class:'field'});
    zonesWrap.appendChild(el('label', {class:'field-label'}, [text('Zonas onde quer comprar (pode escolher mais do que uma)')]));
    if(!state.answers.destino_zonas) state.answers.destino_zonas = [];
    var chipRow = el('div', {class:'tag-multi'});
    function refreshChips(){
      chipRow.innerHTML = '';
      state.answers.destino_zonas.forEach(function(z){
        var chip = el('span', {class:'chip'}, [text(z)]);
        chip.appendChild(el('button', {onclick:function(){
          state.answers.destino_zonas = state.answers.destino_zonas.filter(function(x){return x!==z;});
          refreshChips();
          syncContinue();
        }}, [text('×')]));
        chipRow.appendChild(chip);
      });
    }
    var sel = el('select', {onchange:function(e){
      var v = e.target.value;
      if(v && state.answers.destino_zonas.indexOf(v) === -1){
        state.answers.destino_zonas.push(v);
      }
      e.target.value = '';
      refreshChips();
      syncContinue();
    }});
    sel.appendChild(el('option', {value:''}, [text('+ Adicionar zona')]));
    ['Lisboa','Porto','Braga','Coimbra','Setúbal','Faro','Aveiro','Leiria','Outra'].forEach(function(z){
      sel.appendChild(el('option', {value:z}, [text(z)]));
    });
    zonesWrap.appendChild(sel);
    zonesWrap.appendChild(chipRow);
    refreshChips();
    body.push(zonesWrap);

    function isStep3Complete(){
      return state.answers.destino_tipo && state.answers.destino_zonas.length > 0;
    }
    var advanceBtn = continueBtn('Avançar', isStep3Complete, function(){ state.step = 4; render(); });
    function syncContinue(){
      if(isStep3Complete()) advanceBtn.removeAttribute('disabled');
      else advanceBtn.setAttribute('disabled','disabled');
    }
    body.push(advanceBtn);

    return quizFrame('ETAPA 3 · O QUE PROCURA', 'A casa que tem em mente', 'Quanto mais concreto for aqui, mais rigorosa é a análise.', body, {extraWide:true});
  }

  // STEP 4 — capacidade financeira
  function step4(){
    var body = [];
    body.push(el('div', {class:'q-label'}, [text('Como pensa financiar a compra?')]));
    var grid1 = el('div', {class:'grid2'});
    [
      ['Só com o dinheiro da venda','Casa atual paga, sem crédito novo','so_venda'],
      ['Venda + crédito bancário','Complemento com financiamento','venda_credito'],
      ['Venda + poupanças próprias','Tenho capital disponível','venda_poupancas'],
      ['Compra sem precisar vender já','Não depende da venda para avançar','compra_pronto']
    ].forEach(function(o){
      grid1.appendChild(optionButton(o[0], o[1], o[2], 'financiamento', null, function(v){ state.answers.financiamento = v; render(); }));
    });
    body.push(grid1);

    body.push(el('div', {class:'q-label'}, [text('Capital próprio disponível (além da venda)')]));
    var grid2 = el('div', {class:'grid2'});
    ['Sem capital extra','Menos de 25.000€','25.000€ a 75.000€','75.000€ a 150.000€','Mais de 150.000€','Ainda não sei'].forEach(function(v){
      grid2.appendChild(optionButton(v, null, v, 'capital_proprio', null, function(vv){ state.answers.capital_proprio = vv; render(); }));
    });
    body.push(grid2);

    body.push(continueBtn('Avançar', function(){
      return state.answers.financiamento && state.answers.capital_proprio;
    }, function(){ state.step = 5; render(); }));

    return quizFrame('ETAPA 4 · CAPACIDADE FINANCEIRA', 'Os números que mandam', 'Não precisa de valores exatos — uma estimativa honesta chega.', body, {extraWide:true});
  }

  // STEP 5 — sequência
  function step5(){
    var body = [];
    body.push(el('div', {class:'q-label'}, [text('Precisa de vender antes de poder comprar?')]));
    var grid = el('div', {class:'grid2'});
    [['Sim','Vendo primeiro, compro depois','sim'],['Não','Posso comprar antes de vender','nao'],['Não sei ainda','Preciso de ajuda a perceber','nao_sei']].forEach(function(o){
      grid.appendChild(optionButton(o[0], o[1], o[2], 'sequencia', null, function(v){ state.answers.sequencia = v; state.step = 6; render(); }));
    });
    body.push(grid);
    return quizFrame('ETAPA 5 · ORDEM DA OPERAÇÃO', 'Qual é o seu plano?', 'A estratégia muda por completo consoante a resposta.', body);
  }

  // STEP 6 — timing
  function step6(){
    var body = [];
    body.push(el('div', {class:'q-label'}, [text('Em quanto tempo quer concretizar a mudança?')]));
    var grid = el('div', {class:'grid2'});
    [['Urgente','Menos de 3 meses','urgente'],['3 a 6 meses',null,'3_6m'],['6 a 12 meses',null,'6_12m'],['Mais de 12 meses',null,'12m_mais']].forEach(function(o){
      grid.appendChild(optionButton(o[0], o[1], o[2], 'timing', null, function(v){ state.answers.timing = v; state.step = 7; render(); }));
    });
    body.push(grid);
    return quizFrame('ETAPA 6 · TIMING E URGÊNCIA', 'Quando, e com que pressão?', 'O prazo que tem disponível define a margem de manobra.', body);
  }

  // STEP 7 — decisão
  function step7(){
    var body = [];
    body.push(el('div', {class:'q-label'}, [text('Como descreveria o momento em que está?')]));
    var grid = el('div', {class:'grid2'});
    [
      ['Decidido(a) a avançar','Quero concretizar nos próximos 3 a 6 meses','decidido'],
      ['A ponderar a sério','Estou a estudar a operação e a reunir informação','a_ponderar'],
      ['Só a reunir informação','Sem prazo definido, ainda a perceber a operação','a_recolher']
    ].forEach(function(o){
      grid.appendChild(optionButton(o[0], o[1], o[2], 'decisao', null, function(v){ state.answers.decisao = v; render(); }));
    });
    body.push(grid);
    body.push(continueBtn('Ver o meu resultado', function(){ return !!state.answers.decisao; }, function(){
      state.screen = 'lead'; render();
    }));
    return quizFrame('ETAPA 7 · NÍVEL DE DECISÃO', 'Em que ponto está, sinceramente?', 'Não há resposta errada — só precisamos de honestidade.', body);
  }

  // ---------- LEAD FORM ----------
  function renderLead(){
    var wrap = el('div', {style:'display:flex;justify-content:center;width:100%;'});
    var card = el('div', {class:'card wide'});
    var body = el('div', {class:'card-body'});
    body.appendChild(el('h2', {style:'margin-top:0'}, [text('A sua análise está pronta.')]));
    body.appendChild(el('p', {class:'lede'}, [text('Deixe os seus dados para receber o resultado do diagnóstico.')]));

    var dark = el('div', {style:'background:linear-gradient(180deg,var(--paper-warm) 0%, var(--gold-tint) 100%);border:1px solid var(--gold-pale);border-radius:16px;padding:26px 24px;color:var(--ink);'});
    dark.appendChild(el('div', {class:'eyebrow', style:'color:var(--gold-deep)'}, [text('O SEU NÍVEL DE PREPARAÇÃO')]));
    dark.appendChild(el('h2', {style:'color:var(--ink);font-size:22px;margin:6px 0 14px;'}, [text('já foi calculado.')]));
    dark.appendChild(el('p', {style:'color:var(--ink-soft);font-size:13px;margin:0 0 18px;line-height:1.6;'}, [text('Preencha os campos abaixo para desbloquear o resultado completo. Sem compromisso — só para perceber se faz sentido avançar.')]));

    var nomeInput = el('input', {type:'text', placeholder:'O seu nome completo'});
    var telInput = el('input', {type:'tel', placeholder:'9xx xxx xxx'});
    var emailInput = el('input', {type:'email', placeholder:'email@exemplo.pt'});
    var whatsInput = el('input', {type:'tel', placeholder:'9xx xxx xxx'});

    function field(labelText, inputEl, extraNote){
      var f = el('div', {class:'field'});
      f.appendChild(el('label', {class:'field-label', style:'color:var(--gold-deep)'}, [text(labelText)]));
      f.appendChild(inputEl);
      if(extraNote) f.appendChild(el('div', {style:'font-size:11px;color:var(--ink-soft);margin-top:4px;'}, [text(extraNote)]));
      return f;
    }
    dark.appendChild(field('NOME', nomeInput));
    dark.appendChild(field('TELEMÓVEL', telInput, 'Só os dígitos, sem indicativo'));
    dark.appendChild(field('EMAIL', emailInput));
    dark.appendChild(field('WHATSAPP (OBRIGATÓRIO — enviamos o resultado por aqui)', whatsInput));

    dark.appendChild(el('div', {class:'lock-note'}, [iconTag('warning', 16), el('span',{},[text('Confirme o número antes de enviar. O resultado é enviado por WhatsApp — se o número estiver errado, não o recebe.')])]));

    var consentBox = el('input', {type:'checkbox', id:'consent', style:'margin-top:2px;'});
    var consentRow = el('label', {class:'checkbox-row', for:'consent', style:'color:var(--ink-soft);'}, [
      consentBox,
      el('span', {}, [text('Aceito que os meus dados sejam usados para receber o diagnóstico e ser contactado(a) por '+CONFIG.CONSULTOR_NOME+'. Não partilhamos dados com terceiros.')])
    ]);
    dark.appendChild(consentRow);

    var statusMsg = el('div', {style:'font-size:12.5px;color:var(--gold-deep);margin-top:10px;min-height:16px;'});

    var submitBtn = el('button', {class:'btn-primary', style:'margin-top:6px;'}, [text('QUERO O RESULTADO DO MEU DIAGNÓSTICO →')]);
    submitBtn.addEventListener('click', function(){
      if(!nomeInput.value || !whatsInput.value || !consentBox.checked){
        statusMsg.textContent = 'Preencha nome, WhatsApp e aceite os termos para continuar.';
        return;
      }
      submitBtn.setAttribute('disabled','disabled');
      submitBtn.textContent = 'A enviar...';
      var a = state.answers;
      var lead = {
        id: 'lead_' + Date.now(),
        timestamp: new Date().toISOString(),
        nome: nomeInput.value,
        telemovel: telInput.value,
        email: emailInput.value,
        whatsapp: whatsInput.value,
        score: computeScore(),
        motivo: a.motivo || '',
        imovel_atual_tipo: a.imovel_atual_tipo || '',
        imovel_atual_tipologia: a.imovel_atual_tipologia || '',
        imovel_atual_zona: a.imovel_atual_zona || '',
        imovel_atual_valor: a.imovel_atual_valor || '',
        destino_tipo: a.destino_tipo || '',
        destino_tipologia: a.destino_tipologia || '',
        destino_zonas: (a.destino_zonas || []).join(', '),
        financiamento: a.financiamento || '',
        capital_proprio: a.capital_proprio || '',
        sequencia: a.sequencia || '',
        timing: a.timing || '',
        decisao: a.decisao || '',
        respostas: JSON.stringify(state.answers)
      };
      saveLead(lead).then(function(){
        state.screen = 'thanks';
        state.lastScore = lead.score;
        render();
      }).catch(function(err){
        statusMsg.textContent = 'Não foi possível enviar agora. Tente novamente.';
        submitBtn.removeAttribute('disabled');
        submitBtn.textContent = 'QUERO O RESULTADO DO MEU DIAGNÓSTICO →';
      });
    });

    dark.appendChild(submitBtn);
    dark.appendChild(statusMsg);
    dark.appendChild(el('div', {style:'font-size:10.5px;color:var(--ink-soft);margin-top:12px;display:flex;align-items:center;justify-content:center;gap:5px;'}, [iconTag('lock', 12), text('Dados confidenciais. Sem spam. Só para mostrar o resultado.')]));

    body.appendChild(dark);
    card.appendChild(body);
    wrap.appendChild(card);
    return wrap;
  }

  function computeScore(){
    var a = state.answers;
    var score = 40;
    if(a.decisao === 'decidido') score += 25;
    else if(a.decisao === 'a_ponderar') score += 12;
    if(a.timing === 'urgente') score += 15;
    else if(a.timing === '3_6m') score += 10;
    else if(a.timing === '6_12m') score += 5;
    if(a.financiamento === 'compra_pronto' || a.financiamento === 'venda_poupancas') score += 10;
    if(a.capital_proprio && a.capital_proprio !== 'Sem capital extra') score += 10;
    if(score > 98) score = 98;
    return score;
  }

  // ---------- SAVE (storage + optional Google Sheets webhook) ----------
  function saveLead(lead){
    var promises = [];
    // 1) Guarda dentro do artefacto (demo / backup local, visível no "painel")
    if(window.storage){
      promises.push(window.storage.set(lead.id, JSON.stringify(lead), true).catch(function(){}));
    }
    // 2) Envia para o Google Sheets, se o URL estiver configurado
    if(CONFIG.GOOGLE_SCRIPT_URL){
      promises.push(
        fetch(CONFIG.GOOGLE_SCRIPT_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: {'Content-Type': 'text/plain'},
          body: JSON.stringify(lead)
        }).catch(function(){})
      );
    }
    if(promises.length === 0) return Promise.resolve();
    return Promise.all(promises);
  }

  // ---------- THANK YOU ----------
  function renderThanks(){
    var wrap = el('div', {style:'display:flex;justify-content:center;width:100%;'});
    var card = el('div', {class:'card center-card'});
    card.appendChild(el('div', {class:'eyebrow', style:'justify-content:center'}, [text('DIAGNÓSTICO CONCLUÍDO')]));
    card.appendChild(el('h2', {style:'font-size:24px;'}, [text('Obrigado. O seu resultado está a caminho.')]));
    card.appendChild(el('div', {style:'font-family:Fraunces,serif;font-size:44px;color:var(--pine);margin:14px 0 4px;'}, [text((state.lastScore||70)+'%')]));
    card.appendChild(el('p', {class:'lede', style:'margin-bottom:0'}, [text('Vai receber o relatório completo por WhatsApp nos próximos minutos, com a estratégia mais indicada para o seu caso.')]));
    card.appendChild(el('div', {class:'footer-note'}, [text(CONFIG.CONSULTOR_NOME+' entra em contacto consigo, sem qualquer compromisso, para esclarecer dúvidas.')]));
    wrap.appendChild(card);
    return wrap;
  }

  // ---------- ADMIN (ver leads guardados + exportar Excel) ----------
  function renderAdmin(){
    var wrap = el('div', {style:'display:flex;justify-content:center;width:100%;'});
    var card = el('div', {class:'card', style:'max-width:820px;'});
    var body = el('div', {class:'card-body'});
    body.appendChild(el('h2', {style:'font-size:20px;'}, [text('Painel — submissões recebidas')]));
    body.appendChild(el('p', {class:'lede'}, [text('Esta lista mostra os leads guardados neste artefacto (armazenamento partilhado do Claude). Para uma base de dados em Excel/Google Sheets sempre atualizada, configure o Google Apps Script indicado no chat.')]));

    var tableWrap = el('div', {style:'overflow-x:auto;margin-bottom:16px;'});
    var loadingMsg = el('p', {}, [text('A carregar...')]);
    tableWrap.appendChild(loadingMsg);

    var exportBtn = el('button', {class:'btn-primary', style:'max-width:280px;'}, [text('Descarregar Excel (.xlsx)')]);
    exportBtn.disabled = true;

    body.appendChild(tableWrap);
    body.appendChild(exportBtn);
    card.appendChild(body);
    wrap.appendChild(card);

    var allLeads = [];

    function loadLeads(){
      if(!window.storage){ loadingMsg.textContent = 'Armazenamento não disponível neste ambiente.'; return; }
      window.storage.list('lead_', true).then(function(res){
        var keys = (res && res.keys) || [];
        if(keys.length === 0){
          loadingMsg.textContent = 'Ainda não há submissões.';
          return;
        }
        var gets = keys.map(function(k){ return window.storage.get(k, true).catch(function(){return null;}); });
        Promise.all(gets).then(function(results){
          allLeads = results.filter(Boolean).map(function(r){
            try{ return JSON.parse(r.value); } catch(e){ return null; }
          }).filter(Boolean);
          renderTable();
        });
      }).catch(function(){
        loadingMsg.textContent = 'Não foi possível carregar as submissões.';
      });
    }

    function renderTable(){
      tableWrap.innerHTML = '';
      var table = el('table', {class:'admin-table'});
      var thead = el('tr', {}, ['Data','Nome','Telemóvel','Email','WhatsApp','Score'].map(function(h){ return el('th',{},[text(h)]); }));
      table.appendChild(thead);
      allLeads.forEach(function(l){
        table.appendChild(el('tr', {}, [
          el('td',{},[text(new Date(l.timestamp).toLocaleString('pt-PT'))]),
          el('td',{},[text(l.nome||'')]),
          el('td',{},[text(l.telemovel||'')]),
          el('td',{},[text(l.email||'')]),
          el('td',{},[text(l.whatsapp||'')]),
          el('td',{},[text((l.score||'')+'%')])
        ]));
      });
      tableWrap.appendChild(table);
      exportBtn.disabled = false;
    }

    exportBtn.addEventListener('click', function(){
      if(!window.XLSX || allLeads.length === 0) return;
      var rows = allLeads.map(function(l){
        return {
          Data: new Date(l.timestamp).toLocaleString('pt-PT'),
          Nome: l.nome,
          Telemovel: l.telemovel,
          Email: l.email,
          WhatsApp: l.whatsapp,
          Score: l.score,
          Respostas: l.respostas
        };
      });
      var ws = XLSX.utils.json_to_sheet(rows);
      var wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, 'Leads');
      XLSX.writeFile(wb, 'leads_diagnostico.xlsx');
    });

    loadLeads();
    return wrap;
  }

  render();
})();
</script>
</body>
